<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpotGamma Framework</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0c12; }
    ::-webkit-scrollbar { width: 6px; background: #0a0c12; }
    ::-webkit-scrollbar-thumb { background: #1e2230; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const GREEKS = [
      { name: "Gamma", symbol: "Γ", color: "#5DCAA5", role: "Regime", desc: "Determines how price behaves. Positive gamma = dealers hedge against price (range-bound, mean-reverting). Negative gamma = dealers hedge with price (trending, volatile). The volatility trigger is the gamma flip point — the single most important level." },
      { name: "Delta", symbol: "Δ", color: "#378ADD", role: "Direction", desc: "How many shares a dealer must buy or sell to stay neutral. Rising delta exposure = buying pressure. Falling = selling pressure. Tracked via HERO in real-time — direction of MM hedging is direction of near-term price." },
      { name: "Vanna", symbol: "∂Δ/∂σ", color: "#D4537E", role: "IV-Driven Flows", desc: "How delta changes when implied volatility changes. When VIX drops, OTM put deltas shrink → dealers buy back short hedges → upward pressure. High IV + negative gamma = slingshot: energy stored, released when vol collapses. Most powerful post-FOMC, post-OPEX, post-catalyst." },
      { name: "Charm", symbol: "∂Δ/∂t", color: "#EF9F27", role: "Time-Driven Flows", desc: "How delta decays with time. As expiration approaches, OTM options binary-ize (delta → 0 or 1). Dealers buy back hedges as puts decay. Creates slow upward drift in positive gamma environments pre-OPEX. Accelerates massively on 0DTE — charm is why the market gravitates toward strike pins." },
    ];

    const SETUPS = [
      { id: 1, name: "Volatility Trigger Read", type: "regime", greeks: ["Γ"], condition: "Pre-market, every session", trigger: "Spot vs. Volatility Trigger (VT = gamma flip level)", entry: "Not a trade — determines your playbook for the day", targets: ["Above VT → positive gamma regime: fade extremes, sell premium", "Below VT → negative gamma regime: momentum trades, buy volatility"], stop: "N/A", notes: "First break below VT = expect sharp move + VIX spike. Stats: closing below VT → wide distribution of next-day returns (high vol). Closing just above VT → compressed returns (sell condors). This is your pre-trade filter before anything else.", source: "Vol Trigger stats, Founders Notes framework" },
      { id: 2, name: "Call Wall Fade", type: "short", greeks: ["Γ", "Δ"], condition: "Price within 1% of Call Wall. Positive gamma environment.", trigger: "HERO: orange line falling (call selling) + blue line falling (put buying) simultaneously. Both lines same direction = highest conviction. Optional: 99th percentile flow alert.", entry: "Break below Call Wall. Confirm with HERO flow direction.", targets: ["T1: Hedge Wall", "T2: Put Wall"], stop: "1% above Call Wall (now acts as resistance)", notes: "Call Wall = strike with largest net positive gamma. MMs increase stock selling here. Selling calls + buying puts = MMs sell stock to stay neutral → price drops. If HERO lines flatten rather than fall, do NOT enter — may be mean reversion in positive gamma terrain.", source: "MSTR case study (9:1), NVDA case study (140→130)" },
      { id: 3, name: "Put Wall Bounce", type: "long", greeks: ["Γ", "Δ"], condition: "Price within 1% of Put Wall. Any regime but strongest in positive gamma.", trigger: "HERO: blue line rising (put selling) + orange line rising (call buying). Price reaches Put Wall and begins holding.", entry: "Confirmation of HERO flow reversing bullish at Put Wall.", targets: ["T1: Hedge Wall", "T2: Call Wall"], stop: "1% below Put Wall", notes: "Put Wall = strike with largest net negative gamma. Acts as support because MMs are long puts here — as price approaches, they must buy stock to hedge. Stats: Put Wall holds as support 89% of sessions; S&P closes above put wall 93% of time (SpotGamma stat). After breach: 14bps average next-day return (mean reversion bounce). High hit rate, small wins. Use fixed risk.", source: "SpotGamma stats, intermediate trade framework" },
      { id: 4, name: "Iron Condor Pin", type: "neutral", greeks: ["Γ"], condition: "Price between Call Wall and Put Wall. Large 0DTE iron condor visible in TRACE. Price above Hedge Wall.", trigger: "Positive gamma terrain. TRACE showing condor legs as matching positive/negative GEX pairs. HERO quiet / no directional bias.", entry: "Sell strangle: both legs 1% OTM from current price.", targets: ["Max profit if closes within 3% of entry price"], stop: "Position sizing for fixed risk — high hit rate strategy, not home runs", notes: "Positive gamma = MMs sell into rallies, buy into dips → realized vol compressed. Iron condor exploits this mechanically. Key: condor legs in TRACE are price magnets. Market gravitates to these strikes. HERO quiet = confirmation. If HERO shows strong directional flow, abort — breakout risk.", source: "Gamma pin case study (Nov 13, 12:1), advanced trade structures" },
      { id: 5, name: "0DTE Seek and Destroy", type: "directional", greeks: ["Γ", "Δ"], condition: "Large 0DTE condor visible in TRACE pre-market. High 0DTE flow day (>60% of total volume).", trigger: "HERO flows surge in one direction + 99th percentile strike identified as target. Algo confirms: HERO quiet when objective met, resumes when next leg targeted.", entry: "Direction HERO is moving toward the dominant gamma strike.", targets: ["Dominant 0DTE gamma strike (99th pct) = magnet"], stop: "When HERO flow goes quiet / reverses before reaching target", notes: "The 'seek and destroy algo' runs daily. $5–10B notional 0DTE flow per session. Pattern: HERO surges → price seeks 99th pct strike → HERO quiets at strike → chop → next target appears. Zero DTE positions are here one minute, gone the next — watch TRACE update every 10 min. Local kick-saves happen at 0DTE positive gamma clusters when broader terrain is negative.", source: "0DTE seek and destroy video, SPX futures bookmap video" },
      { id: 6, name: "Call Wall Breakout (Anti-Fade)", type: "long", greeks: ["Γ", "Δ"], condition: "Price approaching Call Wall with persistent, sustained HERO call buying — NOT fading.", trigger: "Rising orange line sustained above $100-175M HERO reading. Long-dated call buying (NOT just 0DTE). Put selling also present. Flow continuing to build as price reaches the wall.", entry: "Do NOT fade. Enter long momentum trade.", targets: ["Next resistance level above Call Wall"], stop: "HERO lines flatten or reverse", notes: "Call Wall acts as resistance MOST of the time. But when you see sustained institutional long-dated call buying at and above the Call Wall, MMs must buy MORE stock as price rises past their short call delta — this amplifies the move. PLTR example: $175M HERO reading + 40M+ long-dated calls = don't fade, ride momentum. Key signal: are the calls 0DTE (fade) or multi-week (ride)?", source: "PLTR breakout tape walkthrough, Tape Walkthru #6" },
      { id: 7, name: "Negative Gamma Momentum", type: "short", greeks: ["Γ", "Δ"], condition: "Price breaks below Volatility Trigger into negative gamma terrain.", trigger: "Both HERO lines moving in same direction (bearish = orange AND blue both falling simultaneously). This is the highest conviction signal. Flow alert fires.", entry: "Short on HERO confirmation after VT break.", targets: ["T1: Next major negative gamma cluster below", "T2: Blue zone (buying support) on TRACE delta pressure map"], stop: "Retest of Volatility Trigger from below", notes: "In negative gamma, MMs sell futures as market falls → price accelerates. Use wider stops than positive gamma setups. VIX will spike. Next support = delta pressure map blue zones (buying pressure) or major put wall below. Exit when HERO put buying slows. Do NOT fight momentum in negative gamma.", source: "Volatility Trigger stats, gamma/0DTE video" },
      { id: 8, name: "Vanna Slingshot", type: "long", greeks: ["Γ", "Δ", "∂Δ/∂σ"], condition: "VIX elevated (25–35+). Market in negative gamma. No imminent catalyst. IV 'too high' relative to actual realized moves. NOTE: this setup has zero fuel when IVR is compressed (<20%) and VIX is at multi-month lows — no mechanical vanna bid available. Do not use in low-vol, low-IVR environments.", trigger: "VIX begins rolling lower (term structure shifts from backwardation toward contango). Put wall stable (not moving lower). HERO begins showing put closing / call buying.", entry: "Long as VIX starts declining from extreme. Strongest post-FOMC, post-OPEX, post-omicron-style resolution.", targets: ["Positive gamma zone / Volatility Trigger from below", "Call Wall beyond"], stop: "VIX spikes back above entry level / Put Wall rolls materially lower", notes: "Mechanism: IV drops → OTM put deltas shrink → MMs buy back short stock hedges → market rallies → higher price + lower IV → more buying (reflexive feedback). 'Slingshot': the higher the VIX at the trough, the faster the snap higher. Vanna + Charm compound: time decay AND IV collapse both force MM buying simultaneously. Best setup: large put expiration upcoming + VIX at elevated levels starting to roll.", source: "Vanna/Charm presentation, Market Slingshot videos, Dec 8 vanna rally" },
      { id: 9, name: "Charm Drift (Pre-OPEX)", type: "long", greeks: ["∂Δ/∂t"], condition: "3–5 days before large monthly OPEX. Large put open interest expiring. Market in or near positive gamma.", trigger: "TRACE charm heat map shows red (selling pressure) above and purple (buying) below. Time decay accelerating on OTM puts.", entry: "Buy directional exposure 3-5 days pre-OPEX. Sell premium against (e.g. covered calls) to capture the vol contraction simultaneously.", targets: ["Call Wall or next major resistance pre-OPEX"], stop: "Negative HERO flow reversal / new put demand rolling in", notes: "Mechanism: OTM puts decay toward zero delta. MMs bought stock to hedge those puts — as delta drops they sell LESS aggressively, net effect is creeping upward drift. Accelerates near expiration (0DTE puts are binary). December 2021 example: large 12/17 put expiry → charm + vanna = rally into FOMC. Quarterly OPEXes are historically the most powerful (see Dec 2018 lows at OPEX). Not a standalone trade — layer onto directional bias.", source: "Vanna/Charm/Delta video, Dec 8 FOMC/OPEX video" },
      { id: 10, name: "Post-Expiration Vol Expansion", type: "directional", greeks: ["Γ"], condition: "Large positive gamma event expires (65%+ of gamma drops off at session end). Next session opens with flat or thin gamma profile.", trigger: "Gamma expiration removes stabilizing hedging flows. TRACE shows thin/no gamma structure.", entry: "Switch from premium selling to directional or long volatility strategies for 1–3 sessions post-expiration.", targets: ["Directional: next major support/resistance without gamma anchor", "Vol: long options while IV still compressed"], stop: "New large position establishes a gamma structure in TRACE", notes: "Example: NVDA at 135 pinned all week by 65% positive gamma at that strike. Friday expiry removes the stabilizing flow → volatility increases next session. Before expiry: sell premium (gamma pin active). After expiry: pivot to long volatility or directional. The pin disappears, price is free to move. Track this on equity-specific OPEX calendars.", source: "NVDA 135 strike pin case study, equity hub walkthrough #13" },
    ];

    const HERO_RULES = [
      { signal: "Orange rising", meaning: "Traders buying calls → MMs buy stock", bias: "Bullish", strong: false },
      { signal: "Blue rising", meaning: "Traders selling puts → MMs buy stock", bias: "Bullish", strong: false },
      { signal: "Both rising simultaneously", meaning: "Maximum bullish confirmation", bias: "Bullish", strong: true },
      { signal: "Orange falling", meaning: "Traders selling calls → MMs sell stock", bias: "Bearish", strong: false },
      { signal: "Blue falling", meaning: "Traders buying puts → MMs sell stock", bias: "Bearish", strong: false },
      { signal: "Both falling simultaneously", meaning: "Maximum bearish confirmation", bias: "Bearish", strong: true },
      { signal: "Both lines flat / quiet", meaning: "No directional hedging pressure", bias: "Neutral", strong: false },
      { signal: "Lines flatten after strong move", meaning: "Flow exhausted → 70% probability of reversion to start (SpotGamma SPY stat)", bias: "Neutral", strong: true },
      { signal: "99th percentile alert fires", meaning: "Massive institutional flow → strike becomes magnet", bias: "Follow flow", strong: true },
    ];

    const LEVELS = [
      { name: "Volatility Trigger", abbr: "VT", color: "#D4537E", role: "Gamma flip point. Above = positive gamma (calm). Below = negative gamma (volatile)." },
      { name: "Call Wall", abbr: "CW", color: "#5DCAA5", role: "Largest net positive gamma. Strong resistance. MMs must increase stock selling here." },
      { name: "Put Wall", abbr: "PW", color: "#378ADD", role: "Largest net negative gamma. Strong support. MMs must increase stock buying here." },
      { name: "Hedge Wall", abbr: "HW", color: "#EF9F27", role: "Largest change in gamma (gamma acceleration). Major S/R. Good intermediate target." },
      { name: "Key Gamma Strike", abbr: "KG", color: "#7F77DD", role: "Strike with largest absolute total gamma. Price magnet. Expect pinning behavior nearby." },
      { name: "Low Vol Point", abbr: "LVP", color: "#9FE1CB", role: "Synthetic OI: most positive gamma. Pinning + suppressed realized vol. Good anchor." },
      { name: "High Vol Point", abbr: "HVP", color: "#F0997B", role: "Synthetic OI: most negative gamma. Momentum zone. Expect vol expansion beyond this." },
    ];

    const typeColors = {
      regime: { bg: "#1a1f2e", border: "#7F77DD", label: "#AFA9EC", text: "REGIME" },
      long: { bg: "#0f1f1a", border: "#1D9E75", label: "#5DCAA5", text: "LONG" },
      short: { bg: "#1f0f0f", border: "#993C1D", label: "#F0997B", text: "SHORT" },
      neutral: { bg: "#1a1a0f", border: "#854F0B", label: "#EF9F27", text: "NEUTRAL" },
      directional: { bg: "#131826", border: "#185FA5", label: "#85B7EB", text: "DIRECTIONAL" },
    };

    // ─── VISUALIZATIONS ──────────────────────────────────────────────────────

    function VizCard({ label, children }) {
      return (
        <div style={{ background: "#0f1118", border: "1px solid #1e2230", borderRadius: "8px", padding: "20px 24px", marginBottom: "16px" }}>
          <div style={{ fontSize: "11px", color: "#5a5e72", letterSpacing: "2px", marginBottom: "18px" }}>{label}</div>
          {children}
        </div>
      );
    }

    function GammaRegimeViz() {
      const W = 600, H = 190, MID = 300;
      const jagged = "M20,155 L40,128 L60,158 L80,124 L100,156 L120,126 L140,154 L160,128 L180,156 L200,126 L220,153 L240,130";
      const smooth = "M360,148 C378,141 392,154 410,148 C428,141 442,154 460,148 C478,141 493,152 510,148 C528,143 543,150 560,148";
      return (
        <VizCard label="VIZ 1 — GAMMA REGIME SPECTRUM">
          <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", display: "block" }}>
            <defs>
              <linearGradient id="negGrad" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stopColor="#F0997B" stopOpacity="0.18" />
                <stop offset="100%" stopColor="#F0997B" stopOpacity="0.03" />
              </linearGradient>
              <linearGradient id="posGrad" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stopColor="#5DCAA5" stopOpacity="0.03" />
                <stop offset="100%" stopColor="#5DCAA5" stopOpacity="0.18" />
              </linearGradient>
            </defs>
            <rect x="0" y="18" width={MID - 8} height="122" fill="url(#negGrad)" rx="6" />
            <rect x={MID + 8} y="18" width={W - MID - 8} height="122" fill="url(#posGrad)" rx="6" />
            <line x1={MID} y1="6" x2={MID} y2="168" stroke="#D4537E" strokeWidth="1.5" strokeDasharray="5,3" />
            <circle cx={MID} cy="68" r="5" fill="#D4537E" />
            <text x={MID} y="5" textAnchor="middle" fill="#D4537E" fontSize="9" fontFamily="monospace" letterSpacing="1">VOL TRIGGER</text>
            <text x="145" y="42" textAnchor="middle" fill="#F0997B" fontSize="12" fontFamily="monospace" fontWeight="bold" letterSpacing="1">NEGATIVE GAMMA</text>
            <text x="455" y="42" textAnchor="middle" fill="#5DCAA5" fontSize="12" fontFamily="monospace" fontWeight="bold" letterSpacing="1">POSITIVE GAMMA</text>
            <text x="145" y="62" textAnchor="middle" fill="#c8ccd8" fontSize="10" fontFamily="monospace">dealers hedge WITH price</text>
            <text x="455" y="62" textAnchor="middle" fill="#c8ccd8" fontSize="10" fontFamily="monospace">dealers hedge AGAINST price</text>
            <text x="145" y="82" textAnchor="middle" fill="#9299b0" fontSize="9" fontFamily="monospace">price rise → MMs buy → more rise</text>
            <text x="455" y="82" textAnchor="middle" fill="#9299b0" fontSize="9" fontFamily="monospace">price rise → MMs sell → dampens</text>
            <text x="145" y="102" textAnchor="middle" fill="#5a5e72" fontSize="9" fontFamily="monospace">40% higher daily vol · momentum bias</text>
            <text x="455" y="102" textAnchor="middle" fill="#5a5e72" fontSize="9" fontFamily="monospace">compressed vol · fade extremes</text>
            <path d={jagged} stroke="#F0997B" strokeWidth="1.5" fill="none" strokeOpacity="0.5" />
            <path d={smooth} stroke="#5DCAA5" strokeWidth="1.5" fill="none" strokeOpacity="0.5" />
            <text x="130" y="178" textAnchor="middle" fill="#3a3e52" fontSize="8" fontFamily="monospace">volatile / trending</text>
            <text x="460" y="178" textAnchor="middle" fill="#3a3e52" fontSize="8" fontFamily="monospace">range-bound / mean-reverting</text>
          </svg>
        </VizCard>
      );
    }

    function HeroMatrixViz() {
      const Cell = ({ bg, border, titleColor, title, sub1, sub2 }) => (
        <div style={{ background: bg, border: `1px solid ${border}`, borderRadius: "4px", padding: "14px 12px" }}>
          <div style={{ fontSize: "12px", color: titleColor, fontFamily: "monospace", fontWeight: "600", marginBottom: "6px" }}>{title}</div>
          <div style={{ fontSize: "10px", color: "#5a5e72", fontFamily: "monospace", lineHeight: "1.6" }}>{sub1}</div>
          <div style={{ fontSize: "10px", color: "#3a3e52", fontFamily: "monospace" }}>{sub2}</div>
        </div>
      );
      const Hdr = ({ text, color }) => (
        <div style={{ fontSize: "10px", color, fontFamily: "monospace", textAlign: "center", padding: "6px 4px", letterSpacing: "1px", lineHeight: "1.6" }}
          dangerouslySetInnerHTML={{ __html: text }} />
      );
      const RowHdr = ({ text }) => (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div style={{ fontSize: "10px", color: "#EF9F27", fontFamily: "monospace", textAlign: "center", lineHeight: "1.5", letterSpacing: "0.5px" }}
            dangerouslySetInnerHTML={{ __html: text }} />
        </div>
      );
      return (
        <VizCard label="VIZ 2 — HERO SIGNAL MATRIX">
          <div style={{ fontSize: "11px", color: "#5a5e72", fontFamily: "monospace", marginBottom: "12px" }}>
            Orange = calls · Blue = puts · Rising = buying/selling direction forces dealer stock purchase or sale
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "90px 1fr 1fr", gap: "4px", alignItems: "stretch" }}>
            <div />
            <Hdr text="PUT LINE UP<br/><span style='color:#3a3e52'>(put selling)</span>" color="#378ADD" />
            <Hdr text="PUT LINE DOWN<br/><span style='color:#3a3e52'>(put buying)</span>" color="#378ADD" />
            <RowHdr text="CALL UP<br/>(buying)" />
            <Cell bg="#0a1a12" border="#1D9E75" titleColor="#5DCAA5" title="★ MAX BULLISH" sub1="Call buying + Put selling" sub2="Dealers buy from BOTH sides" />
            <Cell bg="#0f1118" border="#2a2d3e" titleColor="#9FE1CB" title="Bullish" sub1="Call buying + Put buying" sub2="Dealer buy partially offset" />
            <RowHdr text="CALL DOWN<br/>(selling)" />
            <Cell bg="#0f1118" border="#2a2d3e" titleColor="#F0D09F" title="Bearish" sub1="Call selling + Put selling" sub2="Dealer sell partially offset" />
            <Cell bg="#1a0a0a" border="#993C1D" titleColor="#F0997B" title="★ MAX BEARISH" sub1="Call selling + Put buying" sub2="Dealers sell from BOTH sides" />
          </div>
          <div style={{ marginTop: "12px", fontSize: "10px", color: "#3a3e52", fontFamily: "monospace" }}>
            ★ = both lines same direction → double dealer hedging pressure → highest conviction signal
          </div>
        </VizCard>
      );
    }

    function GexProfileViz() {
      const rows = [
        { strike: 250, gex: 12,   label: "",                  lc: "#5a5e72" },
        { strike: 245, gex: 8,    label: "",                  lc: "#5a5e72" },
        { strike: 240, gex: 42,   label: "CW / MVC — TARGET", lc: "#5DCAA5" },
        { strike: 235, gex: 22,   label: "",                  lc: "#5a5e72" },
        { strike: 230, gex: 15,   label: "HEDGE WALL — TRIM", lc: "#EF9F27" },
        { strike: 228, gex: null, label: "SPOT — ENTRY ZONE", lc: "#378ADD", isSpot: true },
        { strike: 225, gex: 10,   label: "VGS — STOP FLOOR",  lc: "#9FE1CB" },
        { strike: 220, gex: -4,   label: "",                  lc: "#5a5e72" },
        { strike: 215, gex: 6,    label: "(gate B pass)",     lc: "#3a3e52" },
        { strike: 210, gex: -20,  label: "PUT WALL",          lc: "#378ADD" },
        { strike: 205, gex: -8,   label: "",                  lc: "#5a5e72" },
      ];
      const SCALE = 3.2, ZERO_X = 180, LEFT_PAD = 50, ROW_H = 22, TOP_PAD = 14;
      const svgW = 560, svgH = rows.length * ROW_H + TOP_PAD + 10;
      return (
        <VizCard label="VIZ 3 — GEX STRIKE PROFILE (representative LONG-eligible structure)">
          <svg viewBox={`0 0 ${svgW} ${svgH}`} style={{ width: "100%", display: "block" }}>
            <text x={LEFT_PAD + ZERO_X - 4} y={TOP_PAD - 2} textAnchor="end" fill="#3a3e52" fontSize="8" fontFamily="monospace">← negative GEX</text>
            <text x={LEFT_PAD + ZERO_X + 4} y={TOP_PAD - 2} textAnchor="start" fill="#3a3e52" fontSize="8" fontFamily="monospace">positive GEX →</text>
            <line x1={LEFT_PAD + ZERO_X} y1={TOP_PAD} x2={LEFT_PAD + ZERO_X} y2={svgH - 4} stroke="#2a2d3e" strokeWidth="1" />
            {rows.map((row, i) => {
              const cy = TOP_PAD + i * ROW_H + ROW_H / 2;
              const bw = row.gex != null ? Math.abs(row.gex) * SCALE : 0;
              const bx = row.gex != null && row.gex >= 0 ? LEFT_PAD + ZERO_X : LEFT_PAD + ZERO_X - bw;
              const bc = row.gex >= 0 ? "#1D9E75" : "#993C1D";
              const labelX = row.isSpot
                ? LEFT_PAD + ZERO_X + 8
                : row.gex != null && row.gex >= 0
                  ? LEFT_PAD + ZERO_X + bw + 6
                  : LEFT_PAD + ZERO_X - bw - 6;
              return (
                <g key={row.strike}>
                  <text x={LEFT_PAD - 4} y={cy + 4} textAnchor="end"
                    fill={row.isSpot ? "#378ADD" : "#5a5e72"} fontSize="10" fontFamily="monospace" fontWeight={row.isSpot ? "bold" : "normal"}>
                    {row.strike}
                  </text>
                  {row.gex != null && bw > 0 && (
                    <rect x={bx} y={cy - 7} width={bw} height={13} fill={bc} opacity={0.55} rx="2" />
                  )}
                  {row.isSpot && (
                    <line x1={LEFT_PAD} x2={svgW - 4} y1={cy} y2={cy} stroke="#378ADD" strokeWidth="1" strokeDasharray="5,3" strokeOpacity="0.7" />
                  )}
                  {row.label && (
                    <text x={labelX} y={cy + 4}
                      textAnchor={!row.isSpot && row.gex < 0 ? "end" : "start"}
                      fill={row.lc} fontSize="9" fontFamily="monospace">
                      {row.label}
                    </text>
                  )}
                </g>
              );
            })}
          </svg>
        </VizCard>
      );
    }

    function FeedbackLoopsViz() {
      const Arrow = () => <span style={{ color: "#3a3e52", margin: "0 5px", fontSize: "13px" }}>→</span>;
      const Step = ({ text, color }) => (
        <span style={{ background: color + "15", border: `1px solid ${color}30`, borderRadius: "3px", padding: "4px 7px", fontSize: "10px", color, fontFamily: "monospace", lineHeight: "1.4", display: "inline-block" }}>
          {text}
        </span>
      );
      const FlowRow = ({ steps, color }) => (
        <div style={{ display: "flex", alignItems: "center", flexWrap: "wrap", gap: "2px", marginBottom: "6px" }}>
          {steps.map((s, i) => (
            <React.Fragment key={i}>
              <Step text={s} color={color} />
              {i < steps.length - 1 && <Arrow />}
            </React.Fragment>
          ))}
        </div>
      );
      const Panel = ({ symbol, name, color, rows }) => (
        <div style={{ background: "#0a0c12", border: `1px solid ${color}28`, borderRadius: "6px", padding: "14px" }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: "8px", marginBottom: "12px" }}>
            <span style={{ fontSize: "22px", color, lineHeight: 1 }}>{symbol}</span>
            <span style={{ fontSize: "11px", color, fontFamily: "monospace", letterSpacing: "1px" }}>{name}</span>
          </div>
          {rows.map((r, i) => <FlowRow key={i} steps={r} color={color} />)}
        </div>
      );
      return (
        <VizCard label="VIZ 4 — DEALER FEEDBACK LOOPS">

                    borderRadius: "4px", padding: "6px 12px",
                    fontSize: "11px", letterSpacing: "1px", cursor: "pointer",
                    color: activeFilter === f ? "#5DCAA5" : "#5a5e72"
                  }}>
                    {f.toUpperCase()}
                  </button>
                ))}
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
                {filtered.map(setup => {
                  const colors = typeColors[setup.type];
                  const isExpanded = expandedSetup === setup.id;
                  return (
                    <div key={setup.id} onClick={() => setExpandedSetup(isExpanded ? null : setup.id)}
                      style={{ background: colors.bg, border: `1px solid ${isExpanded ? colors.border : "#1e2230"}`, borderRadius: "8px", padding: "16px 20px", cursor: "pointer", transition: "border-color 0.2s" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: isExpanded ? "16px" : "0" }}>
                        <div style={{ fontSize: "11px", fontWeight: "500", background: colors.border + "22", color: colors.label, padding: "3px 8px", borderRadius: "4px", letterSpacing: "1px", flexShrink: 0 }}>{colors.text}</div>
                        <div style={{ fontSize: "13px", color: "#c8ccd8", fontWeight: "500", flex: 1 }}>{setup.id.toString().padStart(2, "0")}. {setup.name}</div>
                        <div style={{ display: "flex", gap: "6px" }}>
                          {setup.greeks.map(g => <span key={g} style={{ fontSize: "11px", color: "#5a5e72", background: "#1e2230", padding: "2px 6px", borderRadius: "3px" }}>{g}</span>)}
                        </div>
                        <div style={{ color: "#5a5e72", fontSize: "12px" }}>{isExpanded ? "▲" : "▼"}</div>
                      </div>
                      {isExpanded && (
                        <div style={{ display: "grid", gap: "14px" }}>
                          <Row label="CONDITION" value={setup.condition} color={colors.label} />
                          <Row label="TRIGGER" value={setup.trigger} color={colors.label} />
                          <Row label="ENTRY" value={setup.entry} color={colors.label} />
                          <div>
                            <div style={{ fontSize: "10px", color: "#5a5e72", letterSpacing: "2px", marginBottom: "6px" }}>TARGETS</div>
                            {setup.targets.map((t, i) => <div key={i} style={{ fontSize: "12px", color: "#c8ccd8", padding: "4px 0", borderLeft: `2px solid ${colors.border}`, paddingLeft: "10px", marginBottom: "4px" }}>{t}</div>)}
                          </div>
                          <Row label="STOP" value={setup.stop} color={colors.label} />
                          <div>
                            <div style={{ fontSize: "10px", color: "#5a5e72", letterSpacing: "2px", marginBottom: "6px" }}>NOTES</div>
                            <div style={{ fontSize: "12px", color: "#9299b0", lineHeight: "1.7" }}>{setup.notes}</div>
                          </div>
                          <SetupViz id={setup.id} />
                          <div style={{ fontSize: "10px", color: "#3a3e52", paddingTop: "10px" }}>SOURCE: {setup.source}</div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {activeTab === "greeks" && (
            <div style={{ display: "flex", flexDirection: "column", gap: "16px" }}>
              {GREEKS.map(g => (
                <div key={g.name} style={{ background: "#0f1118", border: "1px solid #1e2230", borderRadius: "8px", padding: "20px" }}>
                  <div style={{ display: "flex", alignItems: "baseline", gap: "12px", marginBottom: "12px" }}>
                    <div style={{ fontSize: "28px", color: g.color, fontWeight: "500", lineHeight: 1 }}>{g.symbol}</div>
                    <div style={{ fontSize: "14px", color: "#e8eaf0", fontWeight: "500" }}>{g.name}</div>
                    <div style={{ fontSize: "11px", color: g.color, background: g.color + "18", padding: "2px 8px", borderRadius: "3px", letterSpacing: "1px" }}>{g.role}</div>
                  </div>
                  <div style={{ fontSize: "13px", color: "#9299b0", lineHeight: "1.8" }}>{g.desc}</div>
                </div>
              ))}
              <div style={{ background: "#0f1118", border: "1px solid #1e2230", borderRadius: "8px", padding: "20px" }}>
                <div style={{ fontSize: "11px", color: "#5a5e72", letterSpacing: "2px", marginBottom: "12px" }}>HIERARCHY IN PRACTICE</div>
                {[
                  "1. GAMMA first — determines today's regime (pin or trend). Non-negotiable pre-trade read.",
                  "2. DELTA second — HERO tells you real-time which direction MMs are actively hedging.",
                  "3. VANNA when IV is elevated (VIX 25+) — vol crush is the catalyst, not price action.",
                  "4. CHARM near OPEX (3-5 days out) — adds slow upward drift layer to any bullish bias.",
                ].map((item, i) => <div key={i} style={{ fontSize: "12px", color: "#9299b0", padding: "6px 0", borderBottom: "1px solid #1a1d26", lineHeight: "1.6" }}>{item}</div>)}
              </div>
            </div>
          )}

          {activeTab === "levels" && (
            <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
              <div style={{ fontSize: "11px", color: "#5a5e72", letterSpacing: "2px", marginBottom: "4px" }}>SPOTGAMMA KEY LEVELS → YOUR FRAMEWORK</div>
              {LEVELS.map(l => (
                <div key={l.name} style={{ background: "#0f1118", border: "1px solid #1e2230", borderRadius: "6px", padding: "14px 18px", display: "flex", gap: "16px", alignItems: "flex-start" }}>
                  <div style={{ fontSize: "11px", color: l.color, background: l.color + "15", padding: "3px 8px", borderRadius: "3px", letterSpacing: "1px", minWidth: "44px", textAlign: "center", flexShrink: 0 }}>{l.abbr}</div>
                  <div>
                    <div style={{ fontSize: "13px", color: "#e8eaf0", marginBottom: "4px", fontWeight: "500" }}>{l.name}</div>
                    <div style={{ fontSize: "12px", color: "#9299b0", lineHeight: "1.6" }}>{l.role}</div>
                  </div>
                </div>
              ))}
              <div style={{ background: "#0f1118", border: "1px solid #1e2230", borderRadius: "8px", padding: "20px", marginTop: "8px" }}>
                <div style={{ fontSize: "11px", color: "#5a5e72", letterSpacing: "2px", marginBottom: "12px" }}>MAPPING TO YOUR STACK</div>
                {[
                  ["TRACE / GEX bars", "=", "Your primary GEX terrain layer", "#5DCAA5"],
                  ["HERO indicator", "=", "Your CVD / order flow confirmation", "#378ADD"],
                  ["Volatility Trigger", "=", "Your gamma flip concept", "#D4537E"],
                  ["Synthetic OI levels", "=", "QuantData GEX walls + MVC strikes", "#7F77DD"],
                  ["Call Wall / Put Wall", "=", "Your GEX support/resistance anchors", "#EF9F27"],
                  ["Tape (flow data)", "=", "Unusual Whales flow for confirmation", "#9FE1CB"],
                ].map(([a, eq, b, c]) => (
                  <div key={a} style={{ display: "grid", gridTemplateColumns: "160px 20px 1fr", gap: "8px", padding: "6px 0", borderBottom: "1px solid #1a1d26", alignItems: "center" }}>
                    <div style={{ fontSize: "12px", color: c }}>{a}</div>
                    <div style={{ fontSize: "12px", color: "#3a3e52" }}>{eq}</div>
                    <div style={{ fontSize: "12px", color: "#9299b0" }}>{b}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {activeTab === "hero" && (
            <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
              <div style={{ fontSize: "11px", color: "#5a5e72", letterSpacing: "2px", marginBottom: "4px" }}>HERO EXECUTION RULES</div>
              <div style={{ fontSize: "12px", color: "#5a5e72", marginBottom: "8px" }}>Orange line = calls. Blue line = puts. Direction = MM hedging direction = price direction.</div>
              {HERO_RULES.map((r, i) => {
                const bc = r.bias === "Bullish" ? "#5DCAA5" : r.bias === "Bearish" ? "#F0997B" : "#EF9F27";
                return (
                  <div key={i} style={{ background: r.strong ? "#0f1118" : "transparent", border: `1px solid ${r.strong ? bc + "40" : "#1e2230"}`, borderRadius: "6px", padding: "12px 16px", display: "grid", gridTemplateColumns: "220px 1fr 80px", gap: "12px", alignItems: "center" }}>
                    <div style={{ fontSize: "12px", color: r.strong ? "#e8eaf0" : "#9299b0", fontWeight: r.strong ? "500" : "400" }}>{r.signal}</div>
                    <div style={{ fontSize: "12px", color: "#5a5e72" }}>{r.meaning}</div>
                    <div style={{ fontSize: "11px", color: bc, background: bc + "18", padding: "3px 8px", borderRadius: "3px", textAlign: "center", letterSpacing: "1px" }}>{r.bias.toUpperCase()}</div>
                  </div>
                );
              })}
              <div style={{ background: "#0f1118", border: "1px solid #1e2230", borderRadius: "8px", padding: "20px", marginTop: "8px" }}>
                <div style={{ fontSize: "11px", color: "#5a5e72", letterSpacing: "2px", marginBottom: "12px" }}>EXECUTION SEQUENCE (SpotGamma case study method)</div>
                {[
                  "Pre-market: read Founders Note → identify gamma regime + key levels for the day",
                  "Open: watch TRACE for large 0DTE positions (condor legs, big strikes)",
                  "First 15-30 min: watch HERO for directional bias to confirm or deny thesis",
                  "Flow alert fires or 99th pct strike appears → that is your magnet / target",
                  "Both HERO lines same direction = highest conviction → size accordingly",
                  "Enter at key gamma level with stop beyond it (1% rule for Call/Put Wall trades)",
                  "Exit when HERO lines flatten or reverse, or when price reaches gamma target",
                ].map((step, i) => (
                  <div key={i} style={{ display: "flex", gap: "12px", padding: "8px 0", borderBottom: "1px solid #1a1d26" }}>
                    <div style={{ fontSize: "11px", color: "#3a3e52", minWidth: "20px" }}>{String(i + 1).padStart(2, "0")}</div>
                    <div style={{ fontSize: "12px", color: "#9299b0", lineHeight: "1.6" }}>{step}</div>
                  </div>
                ))}
              </div>
              <div style={{ background: "#100a0a", border: "1px solid #993C1D40", borderRadius: "8px", padding: "16px 20px" }}>
                <div style={{ fontSize: "11px", color: "#F0997B", letterSpacing: "2px", marginBottom: "8px" }}>CRITICAL LIMIT</div>
                <div style={{ fontSize: "12px", color: "#9299b0", lineHeight: "1.7" }}>2-trade daily max → apply setup #1 (regime read) every session without exception. Only enter when HERO confirmation aligns with gamma terrain direction. Skew selection via IV rank + risk reversal rank before sizing any options position.</div>
              </div>
            </div>
          )}

          {activeTab === "viz" && (
            <div>
              <GammaRegimeViz />
              <HeroMatrixViz />
              <GexProfileViz />
              <FeedbackLoopsViz />
              <TradeAnatomyViz />
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(SpotGammaSetups));
  </script>
</body>
</html>
